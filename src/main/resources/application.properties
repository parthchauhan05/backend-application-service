spring.application.name=demo
server.port=${PORT:8080}

# Supabase Database - pooler connection for local + Railway
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.cytyozzbxbwcacddlacq.supabase.co:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:7ayFWjfNeFjTrFNn}

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.data-source-properties.sslmode=require

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Supabase Auth - safe defaults for local
supabase.auth.url=${SUPABASE_AUTH_URL:https://cytyozzbxbwcacddlacq.supabase.co/auth/v1}
supabase.auth.key=${SUPABASE_AUTH_KEY:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5dHlvenpieGJ3Y2FjZGRsYWNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MzkzNDcsImV4cCI6MjA4NDQxNTM0N30.oT73Sg20tDonSSQtpPbmlBhQBJwH1JLH82aSurYj5M4}
