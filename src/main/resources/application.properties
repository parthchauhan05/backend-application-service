# Frontend URL - safe default for local
app.frontend.reset-password-url=${APP_FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}

# JWT - safe default for local
jwt.secret=${JWT_SECRET:my-very-long-secret-key-change-this-to-at-least-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger
springdoc.api-docs.path=/api/docs
